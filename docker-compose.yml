# Local dev: API + PostgreSQL. Run dashboard separately: cd apps/dashboard && pnpm dev
services:
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://csc:csc@db:5432/csc_dashboard
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: csc
      POSTGRES_PASSWORD: csc
      POSTGRES_DB: csc_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csc -d csc_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
